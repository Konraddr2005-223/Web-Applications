<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Main-Page</title>
</head>
<body>
    <div id="time-display">0s</div>

    <button id="start-btn">Start</button>
    <button id="stop-btn">Stop</button>
    <button id="reset-btn">Reset</button>

    <hr>

    <h2>Generator Haseł</h2>

    <div>
        <label for="min-length">Minimalna długość:</label>
        <input type="number" id="min-length" value="8">
    </div>
    <div>
        <label for="max-length">Maksymalna długość:</label>
        <input type="number" id="max-length" value="16">
    </div>
    <div>
        <label for="include-uppercase">Wielkie litery (A-Z):</label>
        <input type="checkbox" id="include-uppercase" checked>
    </div>
    <div>
        <label for="include-special">Znaki specjalne (!@#$%):</label>
        <input type="checkbox" id="include-special" checked>
    </div>

    <button id="generate-btn">Wygeneruj hasło</button>

    <hr>

<h2>Ćwiczenie 3: Dane z API (Produkty)</h2>

<div>
    <label for="filter-input">Filtruj po frazie:</label>
    <input type="text" id="filter-input" placeholder="Wpisz tytuł lub opis...">
    
    <label for="sort-select">Sortuj:</label>
    <select id="sort-select">
        <option value="original">Oryginalna kolejność</option> <option value="asc">Rosnąco (po tytule)</option> <option value="desc">Malejąco (po tytule)</option> </select>
</div>

<table border="1" id="products-table">
    <thead>
        <tr>
            <th>Zdjęcie</th> <th>Tytuł</th> <th>Opis</th> </tr>
    </thead>
    <tbody id="products-tbody">
        </tbody>
</table>

    <script src="index.js"></script>







</body>
</html>
