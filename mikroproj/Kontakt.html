<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt</title>
    <link rel="stylesheet" href="kontakt.css">
    <link rel="stylesheet" href="opening.css">
</head>
<body>
    <script src="froms.js"></script>
    <header class="main-header">
        <div class="top-bar">
            
        </div>
        <div class="navbar">
            <div class="container">
                <div class="logo">
                    <img src="photos-gallery/logo.png" alt="DrożdżoweLove Logo">
                </div>
                <div class="opening-status" id="opening-status"></div>
                <nav>
                    <ul>
                        <li><a href="index.html">Strona Główna</a></li>
                        <li><a href="Menu.html">Menu</a></li>
                        <li><a href="Onas.html">O Nas</a></li>
                        <li><a href="Galeria.html">Galeria</a></li>
                        <li><a href="Kontakt.html">Kontakt</a></li>
                    </ul>
                </nav>
                
            </div>
        </div>
        </header>
        <section class="contact-section">
            <div class="container">
                <h2>Skontaktuj się z Nami</h2>
                <p class="contact-intro">Masz pytania, sugestie, a może chcesz złożyć specjalne zamówienie? Napisz do nas!</p>

                <div class="contact-content">
                    <form action="https://formsubmit.co/konraddr2005@wp.pl" method="POST" class="contact-form">
                        <div class="form-group">
                            <label for="name">Imię i Nazwisko:</label>
                            <input type="text" id="name" name="user_name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Adres E-mail:</label>
                            <input type="email" id="email" name="user_email" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Numer Telefonu (opcjonalnie):</label>
                            <input type="tel" id="phone" name="user_phone">
                        </div>
                        <div class="form-group">
                            <label for="subject">Temat:</label>
                            <input type="text" id="subject" name="message_subject" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Twoja Wiadomość:</label>
                            <textarea id="message" name="user_message" rows="6" required></textarea>
                        </div>
                        <button type="submit" class="btn">Wyślij Wiadomość</button>
                    </form>

                    <div class="contact-info">
                        <h3>Odwiedź Nas lub Zadzwoń</h3>
                        <p><i class="fas fa-map-marker-alt"></i> Ul. Szczepańska 12, Kraków</p>
                        <p><i class="fas fa-phone"></i> +48 123 456 789</p>
                        <p><i class="fas fa-envelope"></i> info@drozdzowelove.pl</p>
                        <p><i class="fas fa-clock"></i> Pon-Pt: 8:00 - 18:00 | Sob: 9:00 - 17:00</p>
                        
                        <div class="map-placeholder">
                            <img src="photos-gallery/tupieczemy.png" alt="Mapa lokalizacji" style="width:100%; height:200px; object-fit: cover; border-radius: 8px;">
                        </div>
                    </div>
                </div>
            </div>
        </section>
    <script src="app.js"></script>
</body>
</html>
